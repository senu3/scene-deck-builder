name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  commit-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Commitlint (pull request)
        if: github.event_name == 'pull_request'
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Commitlint (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: npx commitlint --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose

      - name: Commit policy warnings (pull request)
        if: github.event_name == 'pull_request'
        run: node scripts/check-commit-policy.mjs --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --mode warn

      - name: Commit policy warnings (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: node scripts/check-commit-policy.mjs --from "${{ github.event.before }}" --to "${{ github.sha }}" --mode warn

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate checks (strict)
        run: npm run check:gate:strict

      - name: Unit tests
        run: npm test

      - name: Renderer build
        run: npm run build

      - name: Electron build
        run: npm run build:electron
