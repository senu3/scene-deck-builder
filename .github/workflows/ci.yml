name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate checks (strict)
        run: npm run check:gate:strict

      - name: Unit tests
        run: npm test

      - name: Renderer build
        run: npm run build

      - name: Electron build
        run: npm run build:electron
